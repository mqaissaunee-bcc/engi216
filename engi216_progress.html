<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📅 Summer 2026 — ENGI 216: Mechanisms and Machines Progress Progress</title>
<style>
:root{
  --cpb-accent:#0e7490;
  --cpb-surface:#ffffff; --cpb-border:#e4e4e7; --cpb-ink:#1c1c1e;
  --cpb-muted:#6b6b70; --cpb-track:#ececef;
}
@media (prefers-color-scheme: dark){
  :root{
    --cpb-surface:#1c1c1f; --cpb-border:#34343a; --cpb-ink:#f2f2f4;
    --cpb-muted:#a6a6ad; --cpb-track:#34343a;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:transparent;color:var(--cpb-ink);}
.cpb-card{width:100%;max-width:100%;background:var(--cpb-surface);border:1px solid var(--cpb-border);
  border-radius:14px;padding:clamp(14px,3vw,22px);box-shadow:0 1px 2px rgba(0,0,0,.05);}
.cpb-title{margin:0 0 2px;font-size:clamp(1rem,2.6vw,1.18rem);font-weight:700;
  font-family:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;}
.cpb-status{margin:0 0 12px;font-size:.95rem;color:var(--cpb-muted);font-variant-numeric:tabular-nums;}
.cpb-track{width:100%;height:26px;background:var(--cpb-track);border-radius:999px;overflow:hidden;}
.cpb-fill{height:100%;width:0%;background:var(--cpb-accent);border-radius:999px;
  transition:width .9s cubic-bezier(.22,1,.36,1);}
@media (prefers-reduced-motion: reduce){.cpb-fill{transition:none;}}
</style>
</head>
<body>
<div class="cpb-card">
  <p class="cpb-title">📅 Summer 2026 — ENGI 216: Mechanisms and Machines Progress Progress</p>
  <p class="cpb-status" id="cpb-text">Loading…</p>
  <div class="cpb-track" id="cpb-track" role="progressbar" aria-label="ENGI 216: Mechanisms and Machines Progress progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="cpb-fill" id="cpb-fill"></div>
  </div>
</div>
<script>
(function () {
  var startUTC = Date.UTC(2026, 5, 3);
  var endUTC = Date.UTC(2026, 7, 5);
  var holidays = [];
  var weekdaysOnly = false;
  var unit = "days";
  var DAY = 86400000;

  function blocked(t) {
    for (var i = 0; i < holidays.length; i++) { if (holidays[i] === t) return true; }
    if (weekdaysOnly) { var dow = new Date(t).getUTCDay(); if (dow === 0 || dow === 6) return true; }
    return false;
  }

  var now = new Date();
  var todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());

  var total = 0, elapsed = 0;
  for (var cur = startUTC; cur <= endUTC; cur += DAY) {
    if (blocked(cur)) continue;
    total++;
    if (todayUTC >= cur) elapsed++;
  }
  if (elapsed > total) elapsed = total;

  var pct = total > 0 ? (elapsed / total) * 100 : 0;
  var pctStr = (Math.round(pct * 10) / 10).toFixed(1);

  var fill = document.getElementById('cpb-fill');
  var track = document.getElementById('cpb-track');
  var text = document.getElementById('cpb-text');

  var msg;
  if (todayUTC < startUTC) {
    pctStr = '0.0'; pct = 0;
    msg = 'Not started yet \u00b7 0%';
  } else if (total > 0 && elapsed >= total) {
    msg = 'Complete \u00b7 100%';
  } else if (unit === 'weeks') {
    var per = weekdaysOnly ? 5 : 7;
    var totalW = Math.max(1, Math.ceil(total / per));
    var curW = Math.max(1, Math.ceil(elapsed / per));
    msg = 'Week ' + curW + ' of ' + totalW + ' \u00b7 ' + pctStr + '%';
  } else {
    msg = 'Day ' + elapsed + ' of ' + total + ' \u00b7 ' + pctStr + '%';
  }

  fill.style.width = pctStr + '%';
  track.setAttribute('aria-valuenow', String(Math.round(pct)));
  track.setAttribute('aria-valuetext', msg);
  text.textContent = msg;
})();
</script>
</body>
</html>
